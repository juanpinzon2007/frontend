server:
  port: ${PORT:${SERVER_PORT:8082}}

spring:
  application:
    name: order-service
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orders_db}
    username: ${DB_USER:orders_user}
    password: ${DB_PASSWORD:orders_pass}
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orders_db}
    user: ${DB_USER:orders_user}
    password: ${DB_PASSWORD:orders_pass}
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

clients:
  product-service:
    base-url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
