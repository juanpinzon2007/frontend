server:
  port: ${PORT:${SERVER_PORT:8081}}

spring:
  application:
    name: product-service
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:products_db}
    username: ${DB_USER:products_user}
    password: ${DB_PASSWORD:products_pass}
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:products_db}
    user: ${DB_USER:products_user}
    password: ${DB_PASSWORD:products_pass}
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
